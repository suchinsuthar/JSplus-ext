<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captured Requests - JS+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      width: 100%;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0;
    }
    .requests-container {
      max-height: 100%;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      padding: 16px;
    }
    .section {
      padding: 10px;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .export-buttons{
        margin-left: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="container settings-container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon"><img style="width: 36px;;" src="icons/icon128.png"></div>
        <div class="logo-text">
          <div class="title">JS+</div>
          <div class="subtitle">Scan Javascript using AI</div>
        </div>
      </div>
    </div>
    <div class="header">
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <div style="display: flex; align-items: center; gap: 12px;">
          <button class="btn btn-secondary" id="backBtn" title="Back">
            <span class="btn-icon"><img style="width: 10px;" src="icons/arrow-left.svg"></span>
            <span>BACK</span>
          </button>
          <h1 style="margin: 0; font-size: 18px; color: var(--text-primary);">
            CAPTURED_REQUESTS <span id="totalCount" style="color: var(--accent-secondary);">0</span>
          </h1>
        </div>
        <div class="export-buttons">
          <button class="btn btn-export" id="exportUrlsBtn" title="Export URLs only">
            <span class="btn-icon"><img style="width: 18px;" src="icons/save.svg"></span>
            <span>URLS</span>
          </button>
          <button class="btn btn-export" id="exportBtn" title="Export full details">
            <span class="btn-icon"><img style="width: 18px;" src="icons/download.svg"></span>
            <span>JSON</span>
          </button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="filter-section">
        <div class="filter-input-group">
          <input 
            type="text" 
            id="searchInput" 
            class="filter-input" 
            placeholder="Filter by domain, path, or URL..."
            spellcheck="false"
          >
          <button class="btn btn-regex" id="regexToggle" title="Toggle regex mode">
            <span class="btn-icon"><img style="width: 15px;" src="icons/regex.svg"></span>
          </button>
          <button class="btn btn-invert" id="invertToggle" title="Invert search (show non-matching results)">
            <span class="btn-icon">i</span>
          </button>
          <button class="btn btn-favorites" id="favoritesToggle" title="Show favorites only">
            <span class="btn-icon"><img style="width: 15px;" src="icons/star.svg"></span>
          </button>
          <button class="btn btn-clear-search" id="clearSearchBtn" title="Clear filter">
            <span class="btn-icon"><img style="width: 15px;" src="icons/x.svg"></span>
          </button>
        </div>
        <div class="filter-info">
          <span class="filter-count" id="filterCount" style="display: none;">0 / 0</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="requests-container" id="requestsContainer">
        <div class="empty-state">
          <div class="empty-icon"><img style="width: 18px;" src="icons/mailbox.svg"></div>
          <div class="empty-text">No requests captured yet</div>
          <div class="empty-hint">Configure targets in the main popup and start monitoring</div>
        </div>
      </div>
    </div>
  </div>

  <script src="captured-requests.js"></script>
</body>
</html>
