<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS+ Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="settings-page">
  <div class="container settings-container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon"><img style="width: 36px;;" src="icons/icon128.png"></div>
        <div class="logo-text">
          <div class="title">JS+</div>
          <div class="subtitle">Scan Javascript using AI</div>
        </div>
      </div>
      <a href="popup.html" class="btn btn-export settings-back-btn">POPUP</a>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-icon"><img style="width: 18px;" src="icons/cog.svg"></span>
        <span class="section-title">SCANNER_SETTINGS</span>
      </div>

      <div class="settings-grid">
        <div class="settings-field">
          <label for="providerSelect">PROVIDER</label>
          <select id="providerSelect" class="settings-input">
            <option value="gemini">Gemini</option>
            <option value="openai">ChatGPT (OpenAI)</option>
            <option value="anthropic">Claude (Anthropic)</option>
            <option value="deepseek">DeepSeek</option>
          </select>
        </div>

        <div class="settings-field">
          <label for="modelInput">MODEL</label>
          <input id="modelInput" class="settings-input" type="text" placeholder="e.g. gemini-3-flash-preview" spellcheck="false" autocomplete="off">
        </div>

        <div class="settings-field">
          <label for="apiKeyInput">API_KEY</label>
          <div class="api-key-row">
            <input id="apiKeyInput" class="settings-input" type="password" placeholder="Paste your provider API key here" spellcheck="false" autocomplete="off">
            <button class="btn btn-icon-only" id="toggleApiKeyBtn" title="Show / hide key"><img style="width: 18px;" src="icons/eye.svg"></button>
          </div>
        </div>
      </div>

      <div class="settings-actions">
        <button class="btn btn-secondary" id="testConnectionBtn">
          <span class="btn-icon"><img style="width: 18px;" src="icons/user-round-check.svg"></span>
          <span class="btn-text">TEST_CONNECTION</span>
        </button>
        <button class="btn btn-primary" id="saveSettingsBtn">
          <span class="btn-icon"><img style="width: 18px;" src="icons/save-b.svg"></span>
          <span class="btn-text">SAVE_SETTINGS</span>
        </button>
      </div>
      <div class="connection-status" id="connectionStatus"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-icon"><img style="width: 18px;" src="icons/square-terminal.svg"></span>
        <span class="section-title">SCAN_CONSOLE</span>
      </div>

      <div class="scan-id-row">
        <select id="scanIdSelect" class="settings-input">
          <option value="">— Select a captured scan ID —</option>
        </select>
        <button class="btn btn-export" id="loadScanByIdBtn" title="Load stored result for selected ID">
          <span class="btn-text">LOAD</span>
        </button>
      </div>

      <div class="scan-meta" id="scanMeta">No scan started</div>
      <div class="terminal-box" id="scanOutput">Awaiting scan request...</div>
      <div class="settings-actions">
        <button class="btn btn-scan-run" id="runScanBtn">
          <span class="btn-icon"><img style="width: 18px;" src="icons/play.svg"></span>
          <span class="btn-text">RUN_SCAN</span>
        </button>
        <button class="btn btn-export" id="saveResultBtn" title="Save scan result to file" disabled>
          <span class="btn-icon"><img style="width: 18px;" src="icons/save.svg"></span>
          <span class="btn-text">SAVE_RESULT</span>
        </button>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-icon"><img style="width: 18px;" src="icons/notebook-pen.svg"></span>
        <span class="section-title">PROMPT_TEMPLATE</span>
      </div>

      <div class="settings-field settings-field-wide">
        <textarea id="promptInput" class="settings-textarea" spellcheck="false"></textarea>
      </div>

      <div class="settings-actions">
        <button class="btn btn-secondary" id="resetPromptBtn">
          <span class="btn-icon"><img style="width: 18px;" src="icons/rotate-ccw.svg"></span>
          <span class="btn-text">RESET_PROMPT</span>
        </button>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-icon"><img style="width: 18px;" src="icons/git-pull-request.svg"></span>
        <span class="section-title">UPDATE</span>
      </div>
      <div class="update-info-row" id="updateInfoRow">
        <div class="update-version-block">
          <span class="update-label">CURRENT</span>
          <span class="update-value" id="currentVersionDisplay">—</span>
        </div>
        <div class="update-version-block">
          <span class="update-label">LATEST</span>
          <span class="update-value" id="latestVersionDisplay">—</span>
        </div>
        <div class="update-status-block" id="updateStatusBlock"></div>
      </div>
      <div class="settings-actions">
        <button class="btn btn-secondary" id="checkUpdateBtn">
          <span class="btn-icon"><img style="width: 18px;" src="icons/save.svg"></span>
          <span class="btn-text">CHECK_FOR_UPDATES</span>
        </button>
        <a class="btn btn-primary" id="downloadUpdateBtn" href="#" target="_blank" style="display:none;text-decoration:none;">
          <span class="btn-icon"><img style="width: 18px;" src="icons/download.svg"></span>
          <span class="btn-text">DOWNLOAD_UPDATE</span>
        </a>
      </div>
      <div class="connection-status" id="updateCheckStatus"></div>
    </div>

    <div class="section footer-section">
      <div class="footer-content">
        <div class="footer-text">
          <p>JS+ is created with <3 by <a href="https://github.com/suchinsuthar" target="_blank">@SuchinSuthar</a> </p>
          <p>Inspired from <a href="https://github.com/4osp3l/0xJS" target="_blank">0xJS</a></p>
        </div>
        <div class="footer-buttons">
          <a href="https://github.com/suchinsuthar/JSplus-ext/issues" class="btn btn-secondary" target="_blank" title="Report issues">
            <span class="btn-icon"><img style="width: 18px;" src="icons/bug.svg"></span>
            <span class="btn-text">ISSUES</span>
          </a>
          <a href="https://github.com/suchinsuthar/JSplus-ext/pulls" class="btn btn-secondary" target="_blank" title="Create pull requests">
            <span class="btn-icon"><img style="width: 18px;" src="icons/git-pull-request.svg"></span>
            <span class="btn-text">PULL_REQUEST</span>
          </a>
          <a href="https://buymeacoffee.com/suchinsuthar" class="btn btn-secondary" target="_blank" title="Support the developer">
            <span class="btn-icon"><img style="width: 18px;" src="icons/coffee.svg"></span>
            <span class="btn-text">BUY_ME_COFFEE</span>
          </a>
        </div>
      </div>
    </div>
  <script src="settings.js"></script>
</body>
</html>
